name: Deploy Supabase Edge Functions

# Se dispara automáticamente al pushear cambios en Edge Functions o config.
# Botón manual "Run workflow" también disponible desde la pestaña Actions.

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── Funciones INTERNAS (sin verificación de JWT) ────────────────────────
      # scrape-news, generate-digest y send-telegram son llamadas por
      # run-digest-pipeline, no directamente desde afuera. El nuevo sistema
      # de JWT de Supabase 2026 rechaza las llamadas internas, así que las
      # deployamos con --no-verify-jwt.
      - name: Deploy scrape-news (sin JWT)
        run: supabase functions deploy scrape-news --no-verify-jwt --project-ref $PROJECT_ID

      - name: Deploy generate-digest (sin JWT)
        run: supabase functions deploy generate-digest --no-verify-jwt --project-ref $PROJECT_ID

      - name: Deploy send-telegram (sin JWT)
        run: supabase functions deploy send-telegram --no-verify-jwt --project-ref $PROJECT_ID

      # ── Función ORQUESTADORA (con verificación de JWT) ──────────────────────
      # run-digest-pipeline es el entry point público, pg_cron le pasa
      # el service_role_key como bearer.
      - name: Deploy run-digest-pipeline (con JWT)
        run: supabase functions deploy run-digest-pipeline --project-ref $PROJECT_ID

      - name: Listo
        run: echo "✅ Edge Functions desplegadas correctamente"
