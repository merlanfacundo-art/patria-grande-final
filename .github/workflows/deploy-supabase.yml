name: Deploy Supabase Edge Functions

# Corre automáticamente cada vez que se pushea algo a la rama main
# que afecte a las Edge Functions o al config.toml.
# También se puede disparar a mano desde la pestaña "Actions" en GitHub.

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:  # botón manual "Run workflow" en GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verificar conexión
        run: supabase --version

      - name: Deploy de todas las Edge Functions
        run: supabase functions deploy --project-ref $PROJECT_ID

      - name: Listo
        run: echo "✅ Edge Functions desplegadas correctamente"
